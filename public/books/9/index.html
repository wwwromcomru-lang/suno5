<style>
/* ---------------- CSS для защиты ---------------- */ 
body {
    -webkit-user-select: none; 
    -ms-user-select: none; 
    user-select: none; 
    -moz-user-select: none; 
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

/* ---------------- CSS для Fullscreen/Clipped iFrame ---------------- */
#fullscreen-container {
    width: 100vw;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    overflow: hidden; 
}

#clipped-iframe {
    height: calc(100vh + 20px); 
    width: 100vw;
    margin-bottom: -20px; 
    border: none;
    display: block;
}
</style>

</head>
<body oncontextmenu="return false;">

<div id="fullscreen-container">
  <iframe 
    src="https://harmony-in.lovable.app/" 
    id="clipped-iframe" 
    title="Сайт" 
    frameborder="0">
  </iframe>
</div>

<script>
    // Блокировка горячих клавиш (F12, Ctrl+U, Ctrl+Shift+I/J)
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; // F12
        
        // Ctrl+Shift+I, Ctrl+Shift+J
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) return false; 
        
        if(e.ctrlKey && e.keyCode == 85) return false; // Ctrl+U
    };
    
    // Блокируем контекстное меню через JS (для надежности)
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });
</script>

</body>
</html>
